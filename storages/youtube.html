<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/archived/defualt.css" rel="stylesheet">
    <title>Chaebum TV - 저장소 / 채스 빡겜 세상</title>
</head>
<body>
    <h1>채스 빡겜 세상 동영상 저장소</h1>
    <h2>간편하게 다운로드</h2>
    <img src="/archiver/icons/download-icon.png" class="left-down">
    <h2 style="display: inline;">아이콘을 클릭하여 다운로드</h2>    
    <table class="file-table">
        <thead>
            <tr>
                <th>파일 이름</th>
                <th>업로드 날짜</th>
                <th>용량</th>
                <th>작업</th>

        </thead>
        <tbody>
            <tr>
                <td>
                    <img src="/archiver/icons/video.png" class="pic-type">
                    MC범 - 노란펜.mp4
                </td>
                <td>2024-10-21</td>
                <td>2.5MB</td>
                <td>
                    <a href="/archiver/videos/EZBum.mp4" class="button" download>
                        <img src="/archiver/icons/download-icon.png" style="margin: auto; width: 30px;" alt="다운로드"/>
                    </a>
                </td>
            </tr>
            <tr>
                <td>
                    <img src="/archiver/icons/video.png" class="pic-type">
                    ez하죵.mp4
                </td>
                <td>2024-10-21</td>
                <td>2.96MB</td>
                <td>
                    <a href="/archiver/videos/ez하죵.mp4" class="button" download>
                        <img src="/archiver/icons/download-icon.png" style="margin: auto; width: 30px;" alt="다운로드"/>
                    </a>
                </td>
            </tr>
            <!-- 추가 파일 항목은 여기 추가 ㅋㅋ -->
        </tbody>
    </table>
    
</body>
</html>
