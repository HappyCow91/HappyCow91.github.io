<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/defualtvid.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/archiver/favicon/main.ico"/>
    <title>Chaebum TV - ㅋ - 채스 빡겜 세상</title>
</head>
<body>
    <h1>ㅋ - 채스 빡겜 세상</h1>
    <div class="video-container">
        <video class="youtube-style" id="video" preload="metadata">
            <source src="/archiver/videos/ㅋ.mp4" type="video/mp4">
            귀하의 브라우저는 비디오 태그를 지원하지 않습니다.
        </video>
        <div class="controls">
            <button id="playPauseBtn">재생</button>
            <input type="range" id="progressBar" value="0" min="0" max="100">
            <h2>소리 설정</h2>
            <input type="range" id="volumeBar" value="100" min="0" max="100"> <!-- 소리 조절 슬라이더 추가 -->
        </div>
        <br>
        <img src="https://qph.cf2.quoracdn.net/main-qimg-67ff8d101eb4a9fe3353d8c24f279ac4-lq" width="300px" height="200px" style="border-radius: 10px; border: 2px solid rgb(0, 110, 255); box-shadow: 0 0 8px rgb(0, 110, 255)">
        <h3>*채스 빡겜 세상 백업본*</h3>
    </div>
    
    <script src="/scripts/videos.js"></script>
</body>
</html>
